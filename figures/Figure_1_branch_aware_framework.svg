<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1320" viewBox="0 0 1800 1320" role="img" aria-labelledby="title desc">
  <title id="title">Branch-aware antioxidant peptide benchmark and evaluation framework</title>
  <desc id="desc">Four dataset branches flow through evaluation controls into transparent AAC_reference baselines, a controlled frozen ESM-2 comparator, reporting outputs, and a no single best-predictor claim boundary.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 44px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 400 24px Arial, Helvetica, sans-serif; fill: #374151; }
      .laneTitle { font: 700 25px Arial, Helvetica, sans-serif; fill: #111827; }
      .boxTitle { font: 700 24px Arial, Helvetica, sans-serif; fill: #111827; }
      .boxText { font: 400 20px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #374151; }
      .note { font: 700 22px Arial, Helvetica, sans-serif; fill: #111827; }
      .box { fill: #f9fafb; stroke: #6b7280; stroke-width: 3; rx: 24; ry: 24; }
      .branch { fill: #f3f4f6; stroke: #4b5563; }
      .control { fill: #eef2ff; stroke: #4f46e5; }
      .baseline { fill: #ecfdf5; stroke: #059669; }
      .plm { fill: #fff7ed; stroke: #ea580c; }
      .output { fill: #fdf2f8; stroke: #be185d; }
      .boundary { fill: #fef2f2; stroke: #dc2626; }
      .arrow { stroke: #4b5563; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4b5563" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1800" height="1320" />
  <text class="title" x="900" y="72" text-anchor="middle">Branch-aware antioxidant peptide benchmark and evaluation framework</text>
  <text class="subtitle" x="900" y="113" text-anchor="middle">Benchmark governance before model escalation; diagnostic evidence is not promoted to predictor-superiority claims</text>

  <text class="laneTitle" x="95" y="185">1. Dataset branches</text>
  <rect class="box branch" x="70" y="210" width="380" height="130" />
  <text class="boxTitle" x="260" y="252" text-anchor="middle">Positive-core</text>
  <text class="boxText" x="260" y="287" text-anchor="middle">n = 899</text>
  <text class="small" x="260" y="319" text-anchor="middle">formal positive pool</text>
  <rect class="box branch" x="500" y="210" width="380" height="130" />
  <text class="boxTitle" x="690" y="252" text-anchor="middle">Core-negative</text>
  <text class="boxText" x="690" y="287" text-anchor="middle">n = 29</text>
  <text class="small" x="690" y="319" text-anchor="middle">headline negative branch</text>
  <rect class="box branch" x="930" y="210" width="380" height="130" />
  <text class="boxTitle" x="1120" y="252" text-anchor="middle">Sensitivity-negative</text>
  <text class="boxText" x="1120" y="287" text-anchor="middle">n = 3</text>
  <text class="small" x="1120" y="319" text-anchor="middle">separate sensitivity branch</text>
  <rect class="box branch" x="1360" y="210" width="380" height="130" />
  <text class="boxTitle" x="1550" y="252" text-anchor="middle">Challenge-only</text>
  <text class="boxText" x="1550" y="287" text-anchor="middle">n = 28</text>
  <text class="small" x="1550" y="319" text-anchor="middle">post hoc stress-test only</text>

  <path class="arrow" d="M900,365 L900,430" />
  <text class="laneTitle" x="95" y="450">2. Evaluation controls</text>
  <rect class="box control" x="110" y="480" width="720" height="165" />
  <text class="boxTitle" x="470" y="525" text-anchor="middle">Repeated random CV</text>
  <text class="boxText" x="470" y="562" text-anchor="middle">R1-R10, 4 folds</text>
  <text class="small" x="470" y="597" text-anchor="middle">controlled stability; challenge-only excluded</text>
  <rect class="box control" x="970" y="480" width="720" height="165" />
  <text class="boxTitle" x="1330" y="525" text-anchor="middle">Retained R02A hard split</text>
  <text class="boxText" x="1330" y="562" text-anchor="middle">descriptive stress test</text>
  <text class="small" x="1330" y="597" text-anchor="middle">retained assignment; not definitive external validation</text>

  <path class="arrow" d="M900,670 L900,735" />
  <text class="laneTitle" x="95" y="755">3. Model roles after baseline lock</text>
  <rect class="box baseline" x="110" y="785" width="500" height="180" />
  <text class="boxTitle" x="360" y="827" text-anchor="middle">AAC_reference + LR_L2</text>
  <text class="boxText" x="360" y="865" text-anchor="middle">primary transparent baseline</text>
  <text class="small" x="360" y="900" text-anchor="middle">auditable low-dimensional anchor</text>
  <rect class="box baseline" x="650" y="785" width="500" height="180" />
  <text class="boxTitle" x="900" y="827" text-anchor="middle">AAC_reference + Linear SVM</text>
  <text class="boxText" x="900" y="865" text-anchor="middle">secondary comparator</text>
  <text class="small" x="900" y="900" text-anchor="middle">not promoted above LR_L2</text>
  <rect class="box plm" x="1190" y="785" width="500" height="180" />
  <text class="boxTitle" x="1440" y="827" text-anchor="middle">Frozen ESM-2 embeddings</text>
  <text class="boxText" x="1440" y="865" text-anchor="middle">controlled representation comparator</text>
  <text class="small" x="1440" y="900" text-anchor="middle">no fine-tuning; no superiority claim</text>

  <path class="arrow" d="M900,990 L900,1055" />
  <text class="laneTitle" x="95" y="1075">4. Reporting outputs and claim boundary</text>
  <rect class="box output" x="110" y="1105" width="720" height="145" />
  <text class="boxTitle" x="470" y="1148" text-anchor="middle">Traceable evidence package</text>
  <text class="boxText" x="470" y="1184" text-anchor="middle">R01/R03/R04/R05/R06/R07 diagnostic files</text>
  <text class="small" x="470" y="1218" text-anchor="middle">R08 attempted but not interpreted</text>
  <rect class="box boundary" x="970" y="1105" width="720" height="145" />
  <text class="boxTitle" x="1330" y="1148" text-anchor="middle">Claim boundary</text>
  <text class="boxText" x="1330" y="1184" text-anchor="middle">benchmark/evaluation framework</text>
  <text class="small" x="1330" y="1218" text-anchor="middle">not a standalone predictor or web server</text>
</svg>
